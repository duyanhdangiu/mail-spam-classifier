<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Ôn Thi Tin Học Văn Phòng 2016 - Đầy Đủ 60 Câu</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #edf2f7;
            --success-color: #48bb78;
            --error-color: #f56565;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7fafc;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .question-card {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-container {
            display: grid;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: #f7fafc;
            border-color: var(--primary-color);
        }

        .option-label input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        .correct {
            background-color: #c6f6d5 !important;
            border-color: var(--success-color) !important;
        }

        .incorrect {
            background-color: #fed7d7 !important;
            border-color: var(--error-color) !important;
        }

        .explanation {
            margin-top: 15px;
            padding: 12px;
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 25px;
        }

        .btn:hover {
            background: #234e7a;
        }

        .result-box {
            text-align: center;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 6px;
            margin-top: 25px;
            display: none;
        }

        .result-score {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>BỘ QUIZ ÔN THI TIN HỌC VĂN PHÒNG ĐẦY ĐỦ 60 CÂU</h1>

        <div class="quiz-info">
            <span id="progress">Câu hỏi: 0 / 0</span>
            <span id="timer">Thời gian: 00:00</span>
        </div>

        <div id="quiz-container"></div>

        <button id="submit-btn" class="btn" onclick="showResults()" style="display: none;">Kết Thúc Sớm</button>

        <div id="result-box" class="result-box">
            <h2>Kết Quả Làm Bài</h2>
            <div class="result-score" id="score-text">0 / 0</div>
            <p id="feedback-text"></p>
            <button class="btn" onclick="window.location.reload()" style="background: #4a5568;">Làm lại bài test
                mới</button>
        </div>
    </div>

            { q: "Các hàm nào sau đây đều thuộc nhóm hàm thống kê trong Excel?", options: ["LEN, MIN, IF", "MIN, AVERAGE, MAX, COUNT", "IF, MIN, AVERAGE, MAX", "LEN, LEFT, RIGHT, MID"], correct: 1, ref: "Câu 21 - Excel" },
            { q: "Trong Microsoft Excel, để vẽ biểu đồ một cách chính xác nhất ta thực hiện:", options: ["Chọn lệnh: Insert \\ Chart, sau đó chọn dạng biểu đồ", "Chọn khối vùng số liệu vẽ biểu đồ, sau đó chọn lệnh: Insert \\ Chart và chọn dạng biểu đồ", "Chọn lệnh: Home \\ Chart, sau đó chọn dạng biểu đồ", "Cả A và B đều đúng"], correct: 1, ref: "Câu 22 - Excel" },
            { q: "Trong Microsoft Excel, để sắp xếp dữ liệu trong bảng tính, ta chọn vùng dữ liệu và chọn lệnh:", options: ["Formulas \\ Sort", "Data \\ Autofilter", "Insert \\ Sort", "Data \\ Sort"], correct: 3, ref: "Câu 24 - Excel" },
            { q: "Để lọc dữ liệu trong bảng tính Excel, ta chọn vùng dữ liệu cần lọc và chọn lệnh:", options: ["Home \\ Sort & Filter \\ Custom Sort", "Data \\ Filter", "Insert \\ Sort & Filter \\ Filter", "Data \\ Sort"], correct: 1, ref: "Câu 25 - Excel" },
            { q: "Xem bảng báo cáo mẫu câu 26, để điền thông tin cho cột Đơn giá từ bảng tham khảo, công thức tại ô D3 là:", options: ["=HLOOKUP(B3,$B$12:$D$14,3,0)", "=VLOOKUP(B3,$B$12:$D$14,3,0)", "=VLOOKUP(B3,$C$12:$D$14,3,0)", "=VLOOKUP(B3,$B$12:$C$14,2,0)"], correct: 1, ref: "Câu 26 - Excel B" }
        ];

        // Trộn ngẫu nhiên câu hỏi
        const questions = rawQuestions.sort(() => 0.5 - Math.random());

        let score = 0;
        let timeLeft = 0;
        let timerInterval;
        let currentQuestionIndex = 0;
        let firstTry = true;

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            document.getElementById('progress').innerText = `Câu hỏi: ${currentQuestionIndex + 1} / ${questions.length}`;

            firstTry = true;
            const qData = questions[currentQuestionIndex];
            const index = currentQuestionIndex;

            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `Câu ${index + 1}: ${qData.q}`;
            card.appendChild(qText);

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            qData.options.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = `label-${index}-${optIndex}`;

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = `question-${index}`;
                input.value = optIndex;
                
                input.addEventListener('change', function() {
                    checkSingleAnswer(parseInt(this.value), qData, index);
                });

                label.appendChild(input);
                label.appendChild(document.createTextNode(` ${String.fromCharCode(65 + optIndex)}. ${opt}`));
                optionsContainer.appendChild(label);
            });

            card.appendChild(optionsContainer);

            const exp = document.createElement('div');
            exp.className = 'explanation';
            exp.id = `explanation-${index}`;
            exp.innerText = `Mã nguồn tài liệu gốc: ${qData.ref} | Chuyển sang câu tiếp theo...`;
            card.appendChild(exp);

            container.appendChild(card);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft++;
                const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const secs = String(timeLeft % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `Thời gian: ${mins}:${secs}`;
            }, 1000);
        }

        function checkSingleAnswer(userAns, qData, index) {
            const label = document.getElementById(`label-${index}-${userAns}`);
            const correctLabel = document.getElementById(`label-${index}-${qData.correct}`);
            const explanation = document.getElementById(`explanation-${index}`);
            
            if (userAns === qData.correct) {
                if (firstTry) score++;
                correctLabel.classList.add('correct');
                explanation.style.display = 'block';
                
                const inputs = document.querySelectorAll(`input[name="question-${index}"]`);
                inputs.forEach(inp => inp.disabled = true);
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    renderQuiz();
                }, 1200);
            } else {
                firstTry = false;
                label.classList.add('incorrect');
            }
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('quiz-container').innerHTML = '';
            document.getElementById('submit-btn').style.display = 'none';

            document.getElementById('result-box').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / ${questions.length} Câu`;

            const percentage = (score / questions.length) * 100;
            let feedback = "";
            if (percentage >= 80) feedback = "Quá xuất sắc! Bạn đã nắm trọn bộ lý thuyết văn phòng rồi. 🎉";
            else if (percentage >= 50) feedback = "Đạt yêu cầu! Cố gắng luyện tập thêm nhé. 👍";
            else feedback = "Hãy luyện tập lại! Học kỹ các phần lý thuyết để nhớ sâu câu hỏi. 📑";

            document.getElementById('feedback-text').innerText = feedback;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = function () {
            renderQuiz();
            startTimer();
        };
    </script>
</body>
