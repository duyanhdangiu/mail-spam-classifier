<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Ôn Thi Tin Học Văn Phòng 2016</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #edf2f7;
            --success-color: #48bb78;
            --error-color: #f56565;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7fafc;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .question-card {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-container {
            display: grid;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: #f7fafc;
            border-color: var(--primary-color);
        }

        .option-label input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        /* State Styles */
        .correct {
            background-color: #c6f6d5 !important;
            border-color: var(--success-color) !important;
        }

        .incorrect {
            background-color: #fed7d7 !important;
            border-color: var(--error-color) !important;
        }

        .explanation {
            margin-top: 15px;
            padding: 12px;
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 25px;
        }

        .btn:hover {
            background: #2b6cb0;
        }

        .result-box {
            text-align: center;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 6px;
            margin-top: 25px;
            display: none;
        }

        .result-score {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>THI THỬ: TRẮC NGHIỆM TIN HỌC VĂN PHÒNG</h1>

        <div class="quiz-info">
            <span id="progress">Câu hỏi: 0 / 0</span>
            <span id="timer">Thời gian: 00:00</span>
        </div>

        <div id="quiz-container">
        </div>

        <button id="submit-btn" class="btn" onclick="checkAnswers()">Nộp Bài / Xem Kết Quả</button>

        <div id="result-box" class="result-box">
            <h2>Kết Quả Làm Bài</h2>
            <div class="result-score" id="score-text">0 / 0</div>
            <p id="feedback-text"></p>
            <button class="btn" onclick="window.location.reload()" style="background: #4a5568;">Làm lại test
                mới</button>
        </div>
    </div>

        // Xáo trộn ngẫu nhiên bộ câu hỏi để làm bài khách quan hơn
        const questions = rawQuestions.sort(() => 0.5 - Math.random());

        let score = 0;
        let timeLeft = 0;
        let timerInterval;

        // Render toàn bộ đề thi lên trang web
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            document.getElementById('progress').innerText = `Tổng số câu hỏi: ${questions.length}`;

            questions.forEach((qData, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `Câu ${index + 1}: ${qData.q}`;
                card.appendChild(qText);

                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'options-container';

                qData.options.forEach((opt, optIndex) => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${index}-${optIndex}`;

                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${index}`;
                    input.value = optIndex;

                    label.appendChild(input);
                    label.appendChild(document.createTextNode(` ${String.fromCharCode(65 + optIndex)}. ${opt}`));
                    optionsContainer.appendChild(label);
                });

                card.appendChild(optionsContainer);

                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `explanation-${index}`;
                exp.innerText = `Nguồn tài liệu: ${qData.ref} | Đáp án đúng là mục tương ứng chữ đậm trong file ôn tập.`;
                card.appendChild(exp);

                container.appendChild(card);
            });
        }

        // Tính toán thời gian làm bài
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft++;
                const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const secs = String(timeLeft % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `Thời gian: ${mins}:${secs}`;
            }, 1000);
        }

        // Chấm điểm bài thi và hiển thị đáp án, lời giải
        function checkAnswers() {
            clearInterval(timerInterval);
            score = 0;

            questions.forEach((qData, index) => {
                const selected = document.querySelector(`input[name="question-${index}"]:checked`);
                const explanation = document.getElementById(`explanation-${index}`);
                explanation.style.display = 'block'; // Hiện lời giải thích nguồn câu hỏi

                // Tô màu đáp án đúng gốc
                const correctLabel = document.getElementById(`label-${index}-${qData.correct}`);
                if (correctLabel) correctLabel.classList.add('correct');

                if (selected) {
                    const userAns = parseInt(selected.value);
                    if (userAns === qData.correct) {
                        score++;
                    } else {
                        // Nếu chọn sai thì tô màu đỏ vị trí click sai
                        const incorrectLabel = document.getElementById(`label-${index}-${userAns}`);
                        if (incorrectLabel) incorrectLabel.classList.add('incorrect');
                    }
                }
            });

            // Hiện bảng kết quả lên màn hình
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / ${questions.length} Câu`;

            const percentage = (score / questions.length) * 100;
            let feedback = "";
            if (percentage >= 80) feedback = "Xuất sắc! Bạn đã nắm rất vững kiến thức lý thuyết văn phòng. 🎉";
            else if (percentage >= 50) feedback = "Đạt yêu cầu! Hãy cuộn xuống rà soát lại các câu sai màu đỏ nhé. 👍";
            else feedback = "Cần ôn tập kỹ lại! Hãy xem lại các câu có highlight xanh để ghi nhớ phím tắt và câu lệnh. 📑";

            document.getElementById('feedback-text').innerText = feedback;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Khởi tạo ứng dụng khi load xong trang
        window.onload = function () {
            renderQuiz();
            startTimer();
        };
    </script>

</body>
